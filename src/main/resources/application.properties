server.port=8079

spring.application.name=springbootdemo
spring.datasource.url=jdbc:mysql://localhost:3306/test_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=15152697858.*Twj

# MyBatis 配置：开启驼峰转换
mybatis.configuration.map-underscore-to-camel-case=true

# Nacos 注册中心
spring.cloud.nacos.discovery.server-addr=localhost:8848
spring.cloud.nacos.discovery.namespace=9b456078-fd3d-49d2-bd6d-003aeee8ee58
spring.cloud.nacos.discovery.group=DEFAULT_GROUP

# Sentinel 服务限流、熔断、降级
spring.cloud.sentinel.transport.dashboard=localhost:9090
# 取消 Sentinel 的延迟加载 (建议开启，启动后立即注册到控制台)
spring.cloud.sentinel.eager=true
# 指定与控制台通信的本地端口（默认8719）
# 如果本地启动了多个微服务，Sentinel 会自动从 8719 开始扫描直到找到可用端口
spring.cloud.sentinel.transport.port=8719

# Sentinel 持久化方案（配置持久化到 Nacos）
# 流控规则配置
spring.cloud.sentinel.datasource.ds-flow.nacos.server-addr=localhost:8848
spring.cloud.sentinel.datasource.ds-flow.nacos.data-id=${spring.application.name}-flow-rules
spring.cloud.sentinel.datasource.ds-flow.nacos.group-id=DEFAULT_GROUP
spring.cloud.sentinel.datasource.ds-flow.nacos.rule-type=flow
spring.cloud.sentinel.datasource.ds-flow.nacos.data-type=json
spring.cloud.sentinel.datasource.ds-flow.nacos.namespace=9b456078-fd3d-49d2-bd6d-003aeee8ee58

# 熔断规则配置
spring.cloud.sentinel.datasource.ds-degrade.nacos.server-addr=localhost:8848
spring.cloud.sentinel.datasource.ds-degrade.nacos.data-id=${spring.application.name}-degrade-rules
spring.cloud.sentinel.datasource.ds-degrade.nacos.group-id=DEFAULT_GROUP
spring.cloud.sentinel.datasource.ds-degrade.nacos.rule-type=degrade
spring.cloud.sentinel.datasource.ds-degrade.nacos.data-type=json
spring.cloud.sentinel.datasource.ds-degrade.nacos.namespace=9b456078-fd3d-49d2-bd6d-003aeee8ee58

