spring.application.name=springbootdemo
# Nacos 配置中心
spring.cloud.nacos.config.server-addr=localhost:8848
spring.cloud.nacos.config.namespace=9b456078-fd3d-49d2-bd6d-003aeee8ee58
spring.cloud.nacos.config.group=DEFAULT_GROUP
## 配置文件后缀，默认会取 springbootdemo.yaml
spring.cloud.nacos.config.file-extension=yaml

# 加载共享配置 (Shared Configs)
# 索引从 0 开始
spring.cloud.nacos.config.shared-configs[0].data-id=common-db.yaml
spring.cloud.nacos.config.shared-configs[0].group=COMMON
spring.cloud.nacos.config.shared-configs[0].refresh=true

# 加载扩展配置 (Extension Configs)
# 索引从 0 开始
spring.cloud.nacos.config.extension-configs[0].data-id=user-service-ext.yaml
spring.cloud.nacos.config.extension-configs[0].group=DEFAULT_GROUP
spring.cloud.nacos.config.extension-configs[0].refresh=true